<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Password Updated | AutoMoto</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />
        {% load static %}
        <link rel="stylesheet" href="{% static 'job_scraper/css/base.css' %}" />
        <style>
            .account-shell {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
            }

            .account-card {
                width: min(100%, 460px);
                background: var(--bg-card);
                border: 1px solid var(--glass-border);
                border-radius: 1.25rem;
                backdrop-filter: blur(16px);
                padding: 2rem;
                box-shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
            }

            .account-card p {
                color: var(--text-dim);
            }

            .account-link {
                color: var(--primary);
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <main class="account-shell">
            <section class="account-card">
                <a href="{% url 'dashboard' %}" class="logo">AutoMoto</a>
                <h1>Password updated</h1>
                <p>Your account password has been changed successfully.</p>
                <p style="margin-top: 1rem">
                    <a class="account-link" href="{% url 'dashboard' %}"
                        >Return to dashboard</a
                    >
                </p>
            </section>
        </main>
    </body>
</html>
