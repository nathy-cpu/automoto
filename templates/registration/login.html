<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign In | AutoMoto</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />
        {% load static %}
        <link rel="stylesheet" href="{% static 'job_scraper/css/base.css' %}" />
        <style>
            .login-shell {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
            }

            .login-card {
                width: min(100%, 420px);
                background: var(--bg-card);
                border: 1px solid var(--glass-border);
                border-radius: 1.25rem;
                backdrop-filter: blur(16px);
                padding: 2rem;
                box-shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
            }

            .login-card h1 {
                font-size: 1.9rem;
                margin-bottom: 0.75rem;
            }

            .login-card p {
                color: var(--text-dim);
                margin-bottom: 1.5rem;
            }

            .login-card form {
                display: grid;
                gap: 1rem;
            }

            .login-card label {
                display: block;
                margin-bottom: 0.4rem;
                color: var(--text-dim);
                font-size: 0.9rem;
            }

            .login-card input {
                width: 100%;
                padding: 0.85rem 1rem;
                border-radius: 0.85rem;
                border: 1px solid var(--glass-border);
                background: rgba(15, 23, 42, 0.9);
                color: var(--text-main);
            }

            .errorlist,
            .login-error {
                color: #fca5a5;
                list-style: none;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <main class="login-shell">
            <section class="login-card">
                <a href="{% url 'login' %}" class="logo">AutoMoto</a>
                <h1>Sign in</h1>
                <p>Access is limited to admin-created accounts.</p>
                {% if form.non_field_errors %}
                <div class="login-error">{{ form.non_field_errors }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}" />
                    <div>
                        <label for="id_username">Email</label>
                        {{ form.username }}
                    </div>
                    <div>
                        <label for="id_password">Password</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn-apply">Sign in</button>
                </form>
            </section>
        </main>
    </body>
</html>
