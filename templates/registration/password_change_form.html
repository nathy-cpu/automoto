<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Change Password | AutoMoto</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />
        {% load static %}
        <link rel="stylesheet" href="{% static 'job_scraper/css/base.css' %}" />
        <style>
            .account-shell {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
            }

            .account-card {
                width: min(100%, 460px);
                background: var(--bg-card);
                border: 1px solid var(--glass-border);
                border-radius: 1.25rem;
                backdrop-filter: blur(16px);
                padding: 2rem;
                box-shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
            }

            .account-card h1 {
                margin-bottom: 0.75rem;
            }

            .account-card p,
            .helptext {
                color: var(--text-dim);
            }

            .account-card form {
                display: grid;
                gap: 1rem;
                margin-top: 1.5rem;
            }

            .account-card label {
                display: block;
                margin-bottom: 0.4rem;
                color: var(--text-dim);
                font-size: 0.9rem;
            }

            .account-card input {
                width: 100%;
                padding: 0.85rem 1rem;
                border-radius: 0.85rem;
                border: 1px solid var(--glass-border);
                background: rgba(15, 23, 42, 0.9);
                color: var(--text-main);
            }

            .errorlist {
                color: #fca5a5;
                list-style: none;
                margin-bottom: 0.4rem;
            }

            .account-link {
                color: var(--primary);
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <main class="account-shell">
            <section class="account-card">
                <a href="{% url 'dashboard' %}" class="logo">AutoMoto</a>
                <h1>Change password</h1>
                <p>Update your password whenever you need to.</p>
                <form method="post">
                    {% csrf_token %} {{ form.as_p }}
                    <button type="submit" class="btn-apply">
                        Save new password
                    </button>
                </form>
                <p style="margin-top: 1rem">
                    <a class="account-link" href="{% url 'dashboard' %}"
                        >Back to dashboard</a
                    >
                </p>
            </section>
        </main>
    </body>
</html>
